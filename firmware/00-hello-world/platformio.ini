[env:esp32dev]
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino
; upload_port/monitor_port auto-detected; override on CLI with --upload-port if needed
monitor_speed = 115200
build_flags =
  -DUSER_SETUP_LOADED=1
  -DST7796_DRIVER=1
  -DTFT_WIDTH=320
  -DTFT_HEIGHT=480
  -DTFT_MISO=12
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1
  -DTFT_BL=27
  -DTFT_BACKLIGHT_ON=HIGH
  -DTOUCH_CS=33
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DSPI_FREQUENCY=40000000
  -DSPI_TOUCH_FREQUENCY=2500000
  -DTFT_RGB_ORDER=TFT_BGR
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
