[env:esp32dev]
platform  = espressif32@^6.9.0
board     = esp32dev
framework = arduino
; upload_port/monitor_port auto-detected; override on CLI with --upload-port if needed
monitor_speed = 115200

board_build.partitions = partitions.csv
board_build.filesystem = littlefs

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  lvgl/lvgl@^9.2.2
  bblanchon/ArduinoJson@^7.2.0
  ; WiFiClientSecure is bundled with Arduino-ESP32 (no extra lib_dep needed)
  ; HTTPClient is also bundled
  ; SD/FS/SPI are bundled with the arduino-esp32 core — do NOT add an external SD lib

; Exclude calibrate.cpp — cal is disabled; touch uses Phase 0 factory defaults
build_src_filter = +<*> -<app/builtin/calibrate.cpp>

build_flags =
  ; ── TFT_eSPI ─────────────────────────────────────────────────────────────────
  ; USE_HSPI_PORT is REQUIRED: TFT/touch are physically wired to the ESP32 HSPI
  ; hardware peripheral (GPIO 14/13/12).  Without this flag TFT_eSPI defaults to
  ; VSPI, which conflicts with sd_store's SPIClass(VSPI) on GPIO 18/19/23 and
  ; reroutes the VSPI MISO from GPIO12 to GPIO19 on sd_store::init(), causing all
  ; XPT2046 touch reads to return 0x1FFF (all-ones = bus held HIGH by GPIO19).
  -D USER_SETUP_LOADED=1
  -D ST7796_DRIVER=1
  -D TFT_WIDTH=320
  -D TFT_HEIGHT=480
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=27
  -D TFT_BACKLIGHT_ON=HIGH
  -D TOUCH_CS=33
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D SPI_FREQUENCY=40000000
  -D SPI_TOUCH_FREQUENCY=2500000
  -D TFT_RGB_ORDER=TFT_BGR
  -D USE_HSPI_PORT
  ; ── LVGL: only the include flag here; everything else in lv_conf.h ───
  -D LV_CONF_INCLUDE_SIMPLE
  ; ── Project ───
  -D ESPSCREEN_VERSION='"0.1.0"'
  -D ESPSCREEN_PHASE=1
  -I "${PROJECT_DIR}"

; ─────────────────────────────────────────────────────────────────────────────
; Debug variant of the device build — Phase 6.
; = esp32dev + FB_STREAM (live framebuffer streamer on :8090). Compiles
; src/os/fb_stream.cpp (gated #ifdef FB_STREAM). Does NOT touch [env:esp32dev];
; flash this to COM20 for live-framebuffer debugging, not for shipping.
;   pio run -e esp32dev_debug -t upload --upload-port COM20
;
; (A temporary TOFU_DIAG flag, used during the P6 tofu diagnosis to put symbol
; glyphs on the About screen and boot to it, has been reverted — the diagnostic
; glyph row and home-screen override are gone, so it is no longer needed.)
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32dev_debug]
extends = env:esp32dev
build_flags =
  ${env:esp32dev.build_flags}
  -D FB_STREAM

; ─────────────────────────────────────────────────────────────────────────────
; Host (native) simulator/validation builds — Phase 1 + Phase 2.
; Compiles LVGL + the REAL screen code against the sim stub layer. Supports:
;   - headless PNG render:   pio run  -e test_native -t exec   (program.exe [id])
;   - layout validator suite: pio test -e test_native -f test_validate
; Does NOT touch [env:esp32dev] above. The validator/ lib is host-only for now
; (it is pure C / LVGL-only and will join the device build in a later phase).
; ─────────────────────────────────────────────────────────────────────────────
[sim_common]
build_flags =
  -std=gnu++17
  -D ESPSCREEN_SIM=1
  ; about.cpp / firmware identity (mirrors esp32dev's values)
  -D ESPSCREEN_VERSION='"0.1.0"'
  -D ESPSCREEN_PHASE=1
  ; Let ArduinoJson treat our stub String as an Arduino String (uses c_str()/length()
  ; instead of a stream Reader). Only matters for claude_widget's dead JSON path.
  -D ARDUINOJSON_ENABLE_ARDUINO_STRING=1
  ; LVGL picks up sim/lv_conf.h (which forwards to lv_conf_sim.h) because sim/
  ; precedes the project root on the include path below. Using SIMPLE include
  ; (not LV_CONF_PATH) avoids Windows backslash-in-#include escaping issues.
  -D LV_CONF_INCLUDE_SIMPLE
  ; stubs FIRST so <Arduino.h> / <freertos/...> resolve to our host stubs
  -iquote "${PROJECT_DIR}/sim/stubs"
  -I "${PROJECT_DIR}/sim/stubs"
  -I "${PROJECT_DIR}/sim"
  -I "${PROJECT_DIR}/validator"
  -I "${PROJECT_DIR}"
lib_deps =
  lvgl/lvgl@^9.2.2
  ; ArduinoJson is header-only pure C++ — host-portable; satisfies claude_widget's
  ; (never-executed) JSON parse path.
  bblanchon/ArduinoJson@^7.2.0

; Sources compiled into BOTH the headless renderer and the test suite:
;   real screens + real screen_router + ui + registry + validator + stubs.
; Paths are relative to ${PROJECT_SRC_DIR} (= src/); ../ reaches sibling trees.
[env:test_native]
platform = native
extends = sim_common
; pio test must compile the project sources (build_src_filter below) into the
; test program so the harness links sim_registry/sim_display/validator/screens.
test_build_src = true
build_flags =
  ${sim_common.build_flags}
  -D ESPSCREEN_VALIDATE_HARNESS=1
build_src_filter =
  -<*>
  ; ── sim layer ──
  +<../sim/stubs/sim_stubs.cpp>
  +<../sim/stubs/claude_auth_stub.cpp>
  +<../sim/stubs/net_manager_stub.cpp>
  +<../sim/stubs/nvs_store_stub.cpp>
  +<../sim/stubs/config_stub.cpp>
  +<../sim/sim_display.cpp>
  +<../sim/sim_registry.cpp>
  +<../sim/sim_headless_main.cpp>
  ; ── validator (pure C / LVGL-only) ──
  +<../validator/screen_validate.c>
  ; ── real UI + OS ──
  +<ui/widgets.cpp>
  +<ui/theme.cpp>
  +<os/screen_router.cpp>
  +<app/app_registry.cpp>
  ; ── real screens (all 9 renderable) ──
  +<app/builtin/launcher.cpp>
  +<app/builtin/settings.cpp>
  +<app/builtin/about.cpp>
  +<app/builtin/touch_test.cpp>
  +<app/builtin/claude_widget.cpp>
  +<app/builtin/calculator_stub.cpp>
  +<app/builtin/wifi_setup.cpp>

; ─────────────────────────────────────────────────────────────────────────────
; Interactive desktop simulator — Phase 3.
; Renders the REAL screens in a Windows GDI window with mouse-as-touch and
; --screen=<id> selection. Reuses sim_registry + sim/stubs + validator. Has
; EXACTLY one main() (sim/sim_main.cpp); the headless main and Unity harness are
; excluded. Does NOT touch [env:esp32dev] or [env:test_native].
;
; Build + run:
;     pio run -e sim
;     .pio\build\sim\program.exe                 (starts on the launcher)
;     .pio\build\sim\program.exe --screen=claude_widget
; ─────────────────────────────────────────────────────────────────────────────
[env:sim]
platform = native
extends = sim_common
build_flags =
  ${sim_common.build_flags}
  ; Enable LVGL's Windows GDI backend (the -D wins over lv_conf_internal's
  ; #ifndef LV_USE_WINDOWS default of 0; only this env defines it).
  -D LV_USE_WINDOWS=1
  -lgdi32
  -luser32
  ; Winsock for the Phase 6 --mode=live framebuffer viewer/capture.
  -lws2_32
build_src_filter =
  -<*>
  ; ── sim layer (GDI main + registry + stubs; NO headless main, NO Unity) ──
  +<../sim/stubs/sim_stubs.cpp>
  +<../sim/stubs/claude_auth_stub.cpp>
  +<../sim/stubs/net_manager_stub.cpp>
  +<../sim/stubs/nvs_store_stub.cpp>
  +<../sim/stubs/config_stub.cpp>
  +<../sim/sim_registry.cpp>
  +<../sim/sim_main.cpp>
  ; ── validator (pure C / LVGL-only) — doubles as a live checker ──
  +<../validator/screen_validate.c>
  ; ── real UI + OS ──
  +<ui/widgets.cpp>
  +<ui/theme.cpp>
  +<ui/statusbar.cpp>
  +<os/screen_router.cpp>
  +<app/app_registry.cpp>
  ; ── real screens (all 9 renderable) ──
  +<app/builtin/launcher.cpp>
  +<app/builtin/settings.cpp>
  +<app/builtin/about.cpp>
  +<app/builtin/touch_test.cpp>
  +<app/builtin/claude_widget.cpp>
  +<app/builtin/calculator_stub.cpp>
  +<app/builtin/wifi_setup.cpp>
